<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boyington Remix</title>

<style>
:root{
  --gold:#d4af37;
  --gold-light:#f1cd63;
  --bg:#050505;
  --panel:#0b0b0b;
  --text:#f3f3f3;
  --muted:#bdbdbd;
  --border:rgba(212,175,55,0.18);
  --shadow:0 18px 60px rgba(0,0,0,0.55);
  --radius:22px;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#050505;
  color:#f3f3f3;
  margin:0;
  padding:20px;
}

.card{
  background:#0b0b0b;
  border:1px solid rgba(212,175,55,0.18);
  border-radius:22px;
  padding:24px;
  box-shadow:0 18px 60px rgba(0,0,0,0.55);
}

.section-title{
  color:#f1cd63;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.dj-world-matrix{
  position:relative;
  overflow:hidden;
  padding:24px;
  margin-top:20px;
}

.dj-world-matrix::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at top, rgba(212,175,55,0.18), transparent 24%),
    radial-gradient(circle at center, rgba(241,205,99,0.08), transparent 42%),
    radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 22%);
}

.dj-world-matrix-head{
  position:relative;
  z-index:1;
  text-align:center;
  margin-bottom:18px;
}

.dj-world-matrix-sub{
  color:var(--muted);
  margin-top:-4px;
  letter-spacing:0.10em;
  font-size:0.92rem;
}

.dj-world-matrix-layout{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1.1fr 0.9fr;
  gap:20px;
  align-items:center;
}

.dj-matrix-ring{
  position:relative;
  width:min(100%, 580px);
  aspect-ratio:1/1;
  border-radius:50%;
  padding:22px;
  margin:auto;
  background:radial-gradient(circle at center, rgba(212,175,55,0.06), transparent 58%);
  border:1px solid rgba(212,175,55,0.16);
}

.dj-matrix-face{
  height:100%;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, rgba(0,0,0,0.72), rgba(0,0,0,0.94));
}

.dj-digital-time{
  color:var(--gold);
  font-size:clamp(2rem, 5vw, 4rem);
  font-weight:800;
}

.dj-digital-date{
  color:var(--muted);
  margin-top:10px;
}

.dj-matrix-orbit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.orbit-city{
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(212,175,55,0.14);
  background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.16));
  text-align:center;
}

.orbit-city-name{
  display:block;
  color:var(--gold-light);
  margin-bottom:8px;
}

.orbit-city-time{
  color:#fff;
  font-size:1.2rem;
  font-weight:700;
}

@media(max-width:700px){
  .dj-world-matrix-layout{
    grid-template-columns:1fr;
  }

  .dj-matrix-orbit{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<section class="card dj-world-matrix">
  <div class="dj-world-matrix-head">
    <h2 class="section-title">DJ World Matrix</h2>
    <p class="dj-world-matrix-sub">Global Time • Live Session • World Control</p>
  </div>

  <div class="dj-world-matrix-layout">

    <div class="dj-matrix-core-wrap">
      <div class="dj-matrix-ring">
        <div class="dj-matrix-face">

          <div class="dj-matrix-label">GLOBAL LIVE CLOCK</div>

          <div class="dj-digital-time" id="matrixLocalTime">--:--:--</div>
          <div class="dj-digital-date" id="matrixLocalDate">---</div>

        </div>
      </div>
    </div>

    <div class="dj-matrix-orbit">

      <div class="orbit-city">
        <span class="orbit-city-name">Paris</span>
        <span class="orbit-city-time" data-timezone="Europe/Paris">--:--:--</span>
      </div>

      <div class="orbit-city">
        <span class="orbit-city-name">London</span>
        <span class="orbit-city-time" data-timezone="Europe/London">--:--:--</span>
      </div>

      <div class="orbit-city">
        <span class="orbit-city-name">New York</span>
        <span class="orbit-city-time" data-timezone="America/New_York">--:--:--</span>
      </div>

      <div class="orbit-city">
        <span class="orbit-city-name">Tokyo</span>
        <span class="orbit-city-time" data-timezone="Asia/Tokyo">--:--:--</span>
      </div>

    </div>

  </div>
</section>

<script>
function updateDJWorldMatrix() {
  const now = new Date();

  const localTimeEl = document.getElementById('matrixLocalTime');
  const localDateEl = document.getElementById('matrixLocalDate');

  if (localTimeEl) {
    localTimeEl.textContent = now.toLocaleTimeString('fr-FR', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
  }

  if (localDateEl) {
    localDateEl.textContent = now.toLocaleDateString('fr-FR', {
      weekday: 'long',
      day: '2-digit',
      month: 'long',
      year: 'numeric'
    });
  }

  document.querySelectorAll('.orbit-city-time').forEach(el => {
    const tz = el.getAttribute('data-timezone');
    el.textContent = now.toLocaleTimeString('fr-FR', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false,
      timeZone: tz
    });
  });
}

updateDJWorldMatrix();
setInterval(updateDJWorldMatrix, 1000);
</script>

</body>
</html>
