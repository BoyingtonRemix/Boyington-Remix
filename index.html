<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Boyington Remix</title>

<style>

:root{
  --gold:#d4af37;
  --gold-light:#f1cd63;
  --bg:#050505;
  --panel:#0b0b0b;
  --panel-2:#101010;
  --text:#f3f3f3;
  --muted:#bdbdbd;
  --border:rgba(212,175,55,0.18);
  --shadow:0 18px 60px rgba(0,0,0,0.55);
  --radius:22px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{

  font-family:Arial, Helvetica, sans-serif;

  color:var(--text);

  background:
    linear-gradient(
      rgba(0,0,0,0.82),
      rgba(0,0,0,0.92)
    ),
    url('background-boyington-remix.jpg')
    center/cover fixed no-repeat;

  min-height:100vh;

  overflow-x:hidden;

  padding:18px;
}

body::before{

  content:"";

  position:fixed;

  inset:0;

  pointer-events:none;

  background:
    radial-gradient(
      circle at top,
      rgba(212,175,55,0.08),
      transparent 22%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(212,175,55,0.06),
      transparent 20%
    );

  z-index:0;
}

.container{

  position:relative;

  z-index:1;

  max-width:1400px;

  margin:auto;
}

.panel,
.card{

  background:
    linear-gradient(
      180deg,
      rgba(10,10,10,0.95),
      rgba(5,5,5,0.96)
    );

  border:1px solid var(--border);

  border-radius:var(--radius);

  box-shadow:var(--shadow);
}

.hero{

  display:grid;

  grid-template-columns:1.8fr 0.8fr;

  gap:20px;

  margin-bottom:18px;
}

.hero-main{

  position:relative;

  min-height:560px;

  overflow:hidden;

  display:flex;

  align-items:flex-start;

  justify-content:center;

  text-align:center;

  padding-top:10px;

  padding-left:40px;

  padding-right:40px;

  padding-bottom:40px;

  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,0.55),
      rgba(0,0,0,0.72)
    );
}

.hero-main::before{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      90deg,
      transparent 0%,
      rgba(212,175,55,0.05) 18%,
      transparent 36%,
      transparent 64%,
      rgba(212,175,55,0.05) 82%,
      transparent 100%
    );

  pointer-events:none;
}

.hero-center{

  position:relative;

  z-index:2;

  width:100%;

  max-width:900px;
}

h1{

  color:var(--gold);

  font-size:clamp(
    3rem,
    7vw,
    6.4rem
  );

  line-height:0.95;

  letter-spacing:0.22em;

  text-transform:uppercase;

  text-align:center;

  text-shadow:
    0 0 18px rgba(
      212,
      175,
      55,
      0.14
    );

  margin-top:-10px;
}

.logo{

  width:320px;

  height:auto;

  object-fit:contain;

  margin:20px auto 10px;

  display:block;

  filter:drop-shadow(
    0 0 18px rgba(
      212,
      175,
      55,
      0.20
    )
  );
}

.hero-divider{

  width:420px;

  max-width:85%;

  height:34px;

  margin:26px auto 0;

  position:relative;
}

.hero-divider::before,
.hero-divider::after{

  content:"";

  position:absolute;

  top:50%;

  width:42%;

  height:1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      var(--gold),
      transparent
    );
}

.hero-divider::before{
  left:0;
}

.hero-divider::after{
  right:0;
}

.hero-divider span{

  position:absolute;

  left:50%;

  top:50%;

  width:24px;

  height:24px;

  transform:
    translate(-50%, -50%)
    rotate(45deg);

  border:1px solid rgba(
    212,
    175,
    55,
    0.7
  );

  background:
    rgba(212,175,55,0.08);
}

@media(max-width:700px){

.logo{
  width:220px;
}

h1{
  font-size:clamp(
    2.4rem,
    13vw,
    4rem
  );

  letter-spacing:0.14em;
}

}

</style>

</head>

<body>

<div class="container">

<section class="hero">

<div class="panel hero-main">

<div class="hero-center">

<h1>
BOYINGTON<br>
REMIX
</h1>

<img class="logo"
src="logo-boyington.png"
alt="Boyington Remix">

<div class="hero-divider">
<span></span>
</div>

</div>

</div>

</section>

</div>

</body>

</html>
