<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Boyington Remix</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      padding:40px 20px;
      background-image:linear-gradient(to bottom,#050505,#111);
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo img{
      width:180px;
      border-radius:50%;
      box-shadow:0 0 25px rgba(255,215,0,0.3);
    }

    h1{
      text-align:center;
      font-size:48px;
      color:#d4af37;
      margin-top:20px;
      letter-spacing:3px;
    }

    .subtitle{
      text-align:center;
      margin-top:10px;
      color:#cccccc;
      font-size:18px;
      margin-bottom:50px;
    }

    .playlist-section{
      display:flex;
      flex-direction:column;
      gap:35px;
    }

    .track-card{
      background:#111;
      border:1px solid rgba(212,175,55,0.2);
      border-radius:18px;
      padding:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .track-title{
      color:#d4af37;
      margin-bottom:20px;
      font-size:22px;
    }

    iframe{
      border-radius:12px;
    }

    footer{
      margin-top:60px;
      text-align:center;
      color:#999;
      line-height:1.8;
      font-size:14px;
    }

    @media(max-width:768px){

      h1{
        font-size:34px;
      }

      .track-title{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

<div class="container">

  <div class="logo">
    <img src="logo.png" alt="Boyington Remix Logo">
  </div>

  <h1>BOYINGTON REMIX</h1>

  <div class="subtitle">
    Premium Electronic Music Experience
  </div>



  <!-- 🔥🔥🔥 ZONE PLAYLIST BOYINGTON REMIX 🔥🔥🔥 -->
  <!-- ========================================================= -->
  <!-- ====== AJOUTER NOUVEAUX LIENS SOUNDCLOUD ICI ============ -->
  <!-- ========================================================= -->

  <section class="playlist-section">

    <!-- TRACK 01 -->
    <div class="track-card">

      <h2 class="track-title">
        Truly (Remix Emotional) By Boyington Remix
      </h2>

      <iframe
        width="100%"
        height="166"
        scrolling="no"
        frameborder="no"
        allow="autoplay"
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/TON-LIEN-ICI">
      </iframe>

    </div>



    <!-- TRACK 02 -->
    <div class="track-card">

      <h2 class="track-title">
        Chasing Paradise (Original Mix) By Boyington Remix
      </h2>

      <iframe
        width="100%"
        height="166"
        scrolling="no"
        frameborder="no"
        allow="autoplay"
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/TON-LIEN-ICI">
      </iframe>

    </div>



    <!-- TRACK 03 -->
    <div class="track-card">

      <h2 class="track-title">
        Only My Love (Funk Original Mix) By Boyington Remix
      </h2>

      <iframe
        width="100%"
        height="166"
        scrolling="no"
        frameborder="no"
        allow="autoplay"
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/TON-LIEN-ICI">
      </iframe>

    </div>

  </section>



  <footer>

    @BoyingtonRemixOfficial All Rights Reserved<br>
    Alias Péppino

  </footer>

</div>

</body>
</html>
